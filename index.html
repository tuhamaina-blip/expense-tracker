<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-2xl rounded-xl shadow-md border border-gray-200 p-6">
        <h1 class="text-3xl font-bold text-gray-800 text-center mb-6">Expense Tracker</h1>

        <!-- Add Expense Form -->
        <form id="expenseForm" class="space-y-4">
            <input type="text" id="description" placeholder="Expense Description"
                required
                class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-orange-500">

            <input type="number" id="amount" placeholder="Amount" min="1"
                required
                class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-orange-500">

            <select id="category" 
                required 
                class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-orange-500">
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Shopping">Shopping</option>
                <option value="Other">Other</option>
            </select>

            <button type="submit" class="w-full bg-orange-500 text-white py-3 rounded-lg font-semibold hover:bg-orange-600 transition">Add Expense</button>
        </form>

        <!-- Filter -->
        <div class="mt-6">
            <label class="block text-gray-700 font-medium mb-2">Filter By Category</label>

            <select id="filterCategory" class="w-full border border-gray-300 rounded-lg p-3">
                <option value="All">All Categories</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Shopping">Shopping</option>
                <option value="Other">Other</option>
            </select>

        </div>

        <!-- Total -->
        <div class="mt-6 bg-gray-800 text-white rounded-lg p-4 text-center">
            <h2 class="text-lg font-semibold">Total Expenses</h2>
            <p class="text-2xl font-bold mt-1">$<span id="totalExpenses">0</span></p>
        </div>

        <!-- Expense List -->
        <div class="mt-6">
            <h2 class="text-xl font-bold text-gray-800 mb-3">Expenses</h2>
            <ul id="expenseList" class="space-y-3"></ul>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
